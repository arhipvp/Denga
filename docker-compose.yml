services:
  postgres:
    image: postgres:16-alpine@sha256:93d55776e04376e19adb2733e3ccebb4392ee7dd86d8ff238503b30fe719c84f
    restart: unless-stopped
    environment:
      POSTGRES_DB: denga
      POSTGRES_USER: denga
      POSTGRES_PASSWORD: denga
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  python-api:
    image: ${PYTHON_API_IMAGE:-denga-python-api:dev}
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "3001"]
    restart: unless-stopped
    depends_on:
      - postgres
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://denga:denga@postgres:5432/denga?schema=public
    ports:
      - "3001:3001"
    volumes:
      - ./logs:/app/apps/python_backend/logs
      - ./backups:/app/apps/python_backend/backups
      - ./uploads:/app/apps/python_backend/uploads

  python-worker:
    image: ${PYTHON_WORKER_IMAGE:-denga-python-worker:dev}
    command: ["python", "-m", "app.worker"]
    restart: unless-stopped
    depends_on:
      - postgres
      - python-api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://denga:denga@postgres:5432/denga?schema=public
      WORKER_ID: python-worker
    volumes:
      - ./logs:/app/apps/python_backend/logs
      - ./backups:/app/apps/python_backend/backups
      - ./uploads:/app/apps/python_backend/uploads

  web:
    image: ${WEB_IMAGE:-denga-web:dev}
    restart: unless-stopped
    depends_on:
      - python-api
    env_file:
      - .env
    ports:
      - "3000:3000"

volumes:
  postgres-data:
