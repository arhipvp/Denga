services:
  python-api:
    image: ${PYTHON_API_IMAGE:-denga-python-api:dev}
    build:
      context: .
      dockerfile: apps/python_backend/Dockerfile

  python-worker:
    image: ${PYTHON_WORKER_IMAGE:-denga-python-worker:dev}
    build:
      context: .
      dockerfile: apps/python_backend/Dockerfile

  web:
    image: ${WEB_IMAGE:-denga-web:dev}
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
