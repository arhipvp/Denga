name: CI

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Run tests
        run: npm test

      - name: Validate web build environment
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.CI_NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_API_URL_SECRET: ${{ secrets.CI_NEXT_PUBLIC_API_URL }}
        run: |
          if [ -z "$NEXT_PUBLIC_API_URL" ]; then
            NEXT_PUBLIC_API_URL="$NEXT_PUBLIC_API_URL_SECRET"
          fi
          if [ -z "$NEXT_PUBLIC_API_URL" ]; then
            NEXT_PUBLIC_API_URL="http://localhost:3001/api"
          fi
          test -n "$NEXT_PUBLIC_API_URL" || {
            echo "NEXT_PUBLIC_API_URL is required for production build" >&2
            exit 1
          }

      - name: Build application
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.CI_NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_API_URL_SECRET: ${{ secrets.CI_NEXT_PUBLIC_API_URL }}
        run: |
          if [ -z "$NEXT_PUBLIC_API_URL" ]; then
            export NEXT_PUBLIC_API_URL="$NEXT_PUBLIC_API_URL_SECRET"
          fi
          if [ -z "$NEXT_PUBLIC_API_URL" ]; then
            export NEXT_PUBLIC_API_URL="http://localhost:3001/api"
          fi
          npm run build
