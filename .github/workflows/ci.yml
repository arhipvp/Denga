name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    env:
      CI_COMPOSE_FILES: -f docker-compose.yml -f docker-compose.dev.yml
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: npm ci

      - name: Install Python backend dependencies
        run: python -m pip install -e "apps/python_backend[dev]"

      - name: Prepare CI env file for Docker Compose
        run: |
          cp .env.example .env
          {
            echo "DATABASE_URL=postgresql://denga:denga@localhost:5433/denga?schema=public"
            echo "NEXT_PUBLIC_API_URL=http://localhost:3001/api"
          } >> .env

      - name: Start PostgreSQL for migration smoke test
        run: docker compose $CI_COMPOSE_FILES up -d postgres

      - name: Wait for PostgreSQL readiness
        run: |
          for attempt in $(seq 1 24); do
            if docker compose $CI_COMPOSE_FILES exec -T postgres pg_isready -U denga -d denga >/dev/null 2>&1; then
              echo "PostgreSQL is ready"
              exit 0
            fi
            echo "PostgreSQL is not ready yet (attempt $attempt/24), waiting 5s..."
            sleep 5
          done
          echo "PostgreSQL did not become ready in time" >&2
          docker compose $CI_COMPOSE_FILES ps >&2 || true
          docker compose $CI_COMPOSE_FILES logs --tail=200 postgres >&2 || true
          exit 1

      - name: Run database migrations
        env:
          DATABASE_URL: postgresql://denga:denga@localhost:5433/denga?schema=public
        run: python apps/python_backend/scripts/migrate.py upgrade

      - name: Run bootstrap seed
        env:
          DATABASE_URL: postgresql://denga:denga@localhost:5433/denga?schema=public
        run: python apps/python_backend/scripts/bootstrap_seed.py

      - name: Run lint
        run: npm run lint

      - name: Run architecture checks
        run: python -m pytest apps/python_backend/tests/test_architecture.py -q

      - name: Run JavaScript tests
        run: npm test

      - name: Run Python tests
        run: python -m pytest apps/python_backend/tests -q

      - name: Resolve production NEXT_PUBLIC_API_URL
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.CI_NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_API_URL_SECRET: ${{ secrets.CI_NEXT_PUBLIC_API_URL }}
        run: |
          if [ -z "$NEXT_PUBLIC_API_URL" ]; then
            NEXT_PUBLIC_API_URL="$NEXT_PUBLIC_API_URL_SECRET"
          fi
          if [ -z "$NEXT_PUBLIC_API_URL" ]; then
            NEXT_PUBLIC_API_URL="http://localhost:3001/api"
          fi
          test -n "$NEXT_PUBLIC_API_URL" || {
            echo "NEXT_PUBLIC_API_URL is required for production build" >&2
            exit 1
          }
          echo "NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL" >> "$GITHUB_ENV"

      - name: Build application
        run: npm run build

      - name: Derive image coordinates
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          owner="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "IMAGE_REGISTRY=ghcr.io" >> "$GITHUB_ENV"
          echo "IMAGE_NAMESPACE=ghcr.io/$owner" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=${GITHUB_SHA}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push python-api image
        id: build_python_api
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/python_backend/Dockerfile
          push: true
          tags: ${{ env.IMAGE_NAMESPACE }}/denga-python-api:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push python-worker image
        id: build_python_worker
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/python_backend/Dockerfile
          push: true
          tags: ${{ env.IMAGE_NAMESPACE }}/denga-python-worker:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push web image
        id: build_web
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ env.IMAGE_NAMESPACE }}/denga-web:${{ env.IMAGE_TAG }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ env.NEXT_PUBLIC_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Write production release manifest
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          manifest_dir="$RUNNER_TEMP/production-release-manifest"
          mkdir -p "$manifest_dir"
          cat > "$manifest_dir/release-manifest.env" <<EOF
          RELEASE_SHA=${GITHUB_SHA}
          PYTHON_API_IMAGE=${IMAGE_NAMESPACE}/denga-python-api@${{ steps.build_python_api.outputs.digest }}
          PYTHON_WORKER_IMAGE=${IMAGE_NAMESPACE}/denga-python-worker@${{ steps.build_python_worker.outputs.digest }}
          WEB_IMAGE=${IMAGE_NAMESPACE}/denga-web@${{ steps.build_web.outputs.digest }}
          EOF

      - name: Upload production release manifest
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: production-release-manifest
          path: ${{ runner.temp }}/production-release-manifest/release-manifest.env
          if-no-files-found: error
