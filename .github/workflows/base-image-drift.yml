name: Base Image Drift

on:
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  detect-drift:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Check pinned base image drift
        shell: bash
        run: |
          set -euo pipefail

          drift_detected=0

          check_ref() {
            local name="$1"
            local pinned_ref="$2"

            if [[ "$pinned_ref" != *@sha256:* ]]; then
              echo "::error title=Unpinned base image::$name is not pinned by digest: $pinned_ref"
              drift_detected=1
              return
            fi

            local tag_ref="${pinned_ref%@sha256:*}"
            local pinned_digest="sha256:${pinned_ref##*@sha256:}"
            local current_digest
            current_digest="$(docker buildx imagetools inspect "$tag_ref" | awk '/^Digest:/ { print $2; exit }')"

            if [[ -z "$current_digest" ]]; then
              echo "::error title=Unable to resolve base image::$name upstream digest could not be resolved for $tag_ref"
              drift_detected=1
              return
            fi

            if [[ "$current_digest" != "$pinned_digest" ]]; then
              echo "::warning title=Base image drift detected::$name is pinned to $pinned_digest but upstream $tag_ref now resolves to $current_digest"
              drift_detected=1
            else
              echo "$name is up to date: $tag_ref -> $pinned_digest"
            fi
          }

          web_builder_ref="$(awk '/^FROM / { print $2; exit }' apps/web/Dockerfile)"
          web_runner_ref="$(awk '/^FROM / { ref = $2 } END { print ref }' apps/web/Dockerfile)"
          python_ref="$(awk '/^FROM / { print $2; exit }' apps/python_backend/Dockerfile)"
          postgres_ref="$(awk '/image: postgres:/ { print $2; exit }' docker-compose.yml)"

          check_ref "web-builder" "$web_builder_ref"
          check_ref "web-runner" "$web_runner_ref"
          check_ref "python-runtime" "$python_ref"
          check_ref "postgres" "$postgres_ref"

          if [[ "$drift_detected" -ne 0 ]]; then
            echo "Pinned base image drift detected. Dependabot should open an update PR; if it does not, inspect the Docker dependency configuration." >&2
            exit 1
          fi
