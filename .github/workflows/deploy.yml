name: Deploy

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: >
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'
      }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
          REMOTE_APP_DIR: ${{ secrets.REMOTE_APP_DIR }}
          APP_URL: ${{ secrets.APP_URL }}
          API_HEALTHCHECK_URL: ${{ secrets.API_HEALTHCHECK_URL }}
        run: |
          missing=0
          for key in SSH_HOST SSH_PORT SSH_USER SSH_PRIVATE_KEY SSH_KNOWN_HOSTS REMOTE_APP_DIR APP_URL API_HEALTHCHECK_URL; do
            if [ -z "${!key}" ]; then
              echo "Missing required secret: $key" >&2
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Start ssh-agent and add key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Configure known_hosts
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Sync repository to server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          REMOTE_APP_DIR: ${{ secrets.REMOTE_APP_DIR }}
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "mkdir -p '$REMOTE_APP_DIR'"
          rsync -az --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude '.next' \
            --exclude 'coverage' \
            --exclude '.env' \
            --exclude '*.log' \
            -e "ssh -p $SSH_PORT" \
            ./ "$SSH_USER@$SSH_HOST:$REMOTE_APP_DIR/"

      - name: Verify server environment file
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          REMOTE_APP_DIR: ${{ secrets.REMOTE_APP_DIR }}
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "
            if [ ! -f '$REMOTE_APP_DIR/.env' ]; then
              echo 'Missing server env file: $REMOTE_APP_DIR/.env' >&2
              exit 1
            fi
          "

      - name: Deploy with Docker Compose
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          REMOTE_APP_DIR: ${{ secrets.REMOTE_APP_DIR }}
          APP_URL: ${{ secrets.APP_URL }}
          API_HEALTHCHECK_URL: ${{ secrets.API_HEALTHCHECK_URL }}
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "
            set -e
            cd '$REMOTE_APP_DIR'
            APP_URL='$APP_URL' API_HEALTHCHECK_URL='$API_HEALTHCHECK_URL' sh ./scripts/production-cutover.sh
          "

      - name: Verify services on server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          REMOTE_APP_DIR: ${{ secrets.REMOTE_APP_DIR }}
          APP_URL: ${{ secrets.APP_URL }}
          API_HEALTHCHECK_URL: ${{ secrets.API_HEALTHCHECK_URL }}
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "
            set -e
            cd '$REMOTE_APP_DIR'

            if docker compose version >/dev/null 2>&1; then
              COMPOSE_CMD='docker compose'
            elif command -v docker-compose >/dev/null 2>&1; then
              COMPOSE_CMD='docker-compose'
            else
              echo 'Neither docker compose nor docker-compose is available on the server' >&2
              exit 1
            fi

            verify_url() {
              name=\"\$1\"
              url=\"\$2\"

              for attempt in \$(seq 1 18); do
                if curl --fail --show-error --silent \"\$url\" >/dev/null; then
                  echo \"\$name is ready\"
                  return 0
                fi
                echo \"\$name is not ready yet (attempt \$attempt/18), waiting 5s...\"
                sleep 5
              done

              echo \"\$name did not become ready in time\" >&2
              \$COMPOSE_CMD ps >&2 || true
              \$COMPOSE_CMD logs --tail=200 python-api >&2 || true
              \$COMPOSE_CMD logs --tail=200 python-worker >&2 || true
              \$COMPOSE_CMD logs --tail=100 web >&2 || true
              return 1
            }

            verify_running_service() {
              service_name=\"\$1\"
              if ! \$COMPOSE_CMD ps --status running --services | grep -Fx \"\$service_name\" >/dev/null; then
                echo \"Service \$service_name is not running\" >&2
                \$COMPOSE_CMD ps >&2 || true
                \$COMPOSE_CMD logs --tail=200 \"\$service_name\" >&2 || true
                return 1
              fi
            }

            verify_running_service 'python-worker'
            verify_url 'API' '$API_HEALTHCHECK_URL'
            verify_url 'Web' '$APP_URL'
          "
