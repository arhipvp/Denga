name: Deploy

on:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
          REMOTE_APP_DIR: ${{ secrets.REMOTE_APP_DIR }}
          PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}
          APP_URL: ${{ secrets.APP_URL }}
          API_HEALTHCHECK_URL: ${{ secrets.API_HEALTHCHECK_URL }}
        run: |
          missing=0
          for key in SSH_HOST SSH_PORT SSH_USER SSH_PRIVATE_KEY SSH_KNOWN_HOSTS REMOTE_APP_DIR PROD_ENV_FILE APP_URL API_HEALTHCHECK_URL; do
            if [ -z "${!key}" ]; then
              echo "Missing required secret: $key" >&2
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Start ssh-agent and add key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Configure known_hosts
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Sync repository to server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          REMOTE_APP_DIR: ${{ secrets.REMOTE_APP_DIR }}
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "mkdir -p '$REMOTE_APP_DIR'"
          rsync -az --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude '.next' \
            --exclude 'coverage' \
            --exclude '.env' \
            --exclude '*.log' \
            -e "ssh -p $SSH_PORT" \
            ./ "$SSH_USER@$SSH_HOST:$REMOTE_APP_DIR/"

      - name: Upload production environment file
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          REMOTE_APP_DIR: ${{ secrets.REMOTE_APP_DIR }}
          PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "cat > '$REMOTE_APP_DIR/.env'" <<< "$PROD_ENV_FILE"

      - name: Deploy with Docker Compose
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          REMOTE_APP_DIR: ${{ secrets.REMOTE_APP_DIR }}
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "
            set -e
            cd '$REMOTE_APP_DIR'
            if docker compose version >/dev/null 2>&1; then
              COMPOSE_CMD='docker compose'
            elif command -v docker-compose >/dev/null 2>&1; then
              COMPOSE_CMD='docker-compose'
            else
              echo 'Neither docker compose nor docker-compose is available on the server' >&2
              exit 1
            fi
            \$COMPOSE_CMD up --build -d
          "

      - name: Verify API
        run: |
          for attempt in $(seq 1 12); do
            if curl --fail --show-error --silent "${{ secrets.API_HEALTHCHECK_URL }}" >/dev/null; then
              exit 0
            fi
            echo "API is not ready yet (attempt $attempt/12), waiting 5s..."
            sleep 5
          done
          echo "API did not become ready in time" >&2
          exit 1

      - name: Verify web
        run: |
          for attempt in $(seq 1 12); do
            if curl --fail --show-error --silent "${{ secrets.APP_URL }}" >/dev/null; then
              exit 0
            fi
            echo "Web is not ready yet (attempt $attempt/12), waiting 5s..."
            sleep 5
          done
          echo "Web did not become ready in time" >&2
          exit 1
