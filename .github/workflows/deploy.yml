name: Deploy

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: >
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'
      }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          repository: ${{ github.event.workflow_run.repository.full_name }}

      - name: Verify checkout matches triggering workflow commit
        run: |
          echo "workflow_run.head_sha=${{ github.event.workflow_run.head_sha }}"
          current_sha="$(git rev-parse HEAD)"
          echo "checked_out_sha=${current_sha}"
          if [ "$current_sha" != "${{ github.event.workflow_run.head_sha }}" ]; then
            echo "Checked out commit does not match triggering workflow commit" >&2
            exit 1
          fi

      - name: Write release markers
        run: |
          printf '%s\n' "${{ github.event.workflow_run.head_sha }}" > DEPLOYED_SHA
          date -u +%Y-%m-%dT%H:%M:%SZ > DEPLOYED_AT_UTC

      - name: Validate required secrets
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
          REMOTE_APP_DIR: ${{ secrets.REMOTE_APP_DIR }}
          APP_URL: ${{ secrets.APP_URL }}
        run: |
          missing=0
          for key in SSH_HOST SSH_PORT SSH_USER SSH_PRIVATE_KEY SSH_KNOWN_HOSTS REMOTE_APP_DIR APP_URL; do
            if [ -z "${!key}" ]; then
              echo "Missing required secret: $key" >&2
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Start ssh-agent and add key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Configure known_hosts
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Sync repository to server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          REMOTE_APP_DIR: ${{ secrets.REMOTE_APP_DIR }}
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "mkdir -p '$REMOTE_APP_DIR'"
          rsync -az --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude '.next' \
            --exclude 'coverage' \
            --exclude '.env' \
            --exclude '*.log' \
            -e "ssh -p $SSH_PORT" \
            ./ "$SSH_USER@$SSH_HOST:$REMOTE_APP_DIR/"

      - name: Verify server environment file
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          REMOTE_APP_DIR: ${{ secrets.REMOTE_APP_DIR }}
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "
            if [ ! -f '$REMOTE_APP_DIR/.env' ]; then
              echo 'Missing server env file: $REMOTE_APP_DIR/.env' >&2
              exit 1
            fi
          "

      - name: Verify synced release markers on server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          REMOTE_APP_DIR: ${{ secrets.REMOTE_APP_DIR }}
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "
            set -e
            cd '$REMOTE_APP_DIR'

            if [ ! -f DEPLOYED_SHA ]; then
              echo 'Missing DEPLOYED_SHA on server after rsync' >&2
              exit 1
            fi

            deployed_sha=\$(tr -d '\r\n' < DEPLOYED_SHA)
            echo \"server_deployed_sha=\$deployed_sha\"
            if [ \"\$deployed_sha\" != '${{ github.event.workflow_run.head_sha }}' ]; then
              echo 'Server DEPLOYED_SHA does not match triggering workflow commit' >&2
              exit 1
            fi

            grep -q 'metrics_snapshot' apps/python_backend/app/api.py || {
              echo 'Expected metrics_snapshot marker not found in synced api.py' >&2
              exit 1
            }
            grep -q 'ensure_request_context' apps/python_backend/app/api.py || {
              echo 'Expected request context marker not found in synced api.py' >&2
              exit 1
            }
            grep -q 'jobQueue' apps/python_backend/app/services_runtime.py || {
              echo 'Expected jobQueue marker not found in synced services_runtime.py' >&2
              exit 1
            }
          "

      - name: Deploy with Docker Compose
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          REMOTE_APP_DIR: ${{ secrets.REMOTE_APP_DIR }}
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "
            set -e
            cd '$REMOTE_APP_DIR'

            if docker compose version >/dev/null 2>&1; then
              COMPOSE_CMD='docker compose'
            elif command -v docker-compose >/dev/null 2>&1; then
              COMPOSE_CMD='docker-compose'
            else
              echo 'Neither docker compose nor docker-compose is available on the server' >&2
              exit 1
            fi

            mkdir -p backups
            timestamp=\$(date -u +%Y%m%dT%H%M%SZ)
            backup_file=\"backups/deploy-pre-\${timestamp}.dump\"
            baseline_snapshot=\"backups/deploy-baseline-\${timestamp}.json\"

            echo 'Building release images'
            \$COMPOSE_CMD build python-api python-worker web
            \$COMPOSE_CMD -f docker-compose.yml -f docker-compose.migrate.yml build prisma-bootstrap

            echo \"Creating fresh production backup at \$backup_file\"
            \$COMPOSE_CMD up -d postgres
            \$COMPOSE_CMD exec -T postgres sh -lc 'PGPASSWORD=\"\$POSTGRES_PASSWORD\" pg_dump -U \"\$POSTGRES_USER\" -d \"\$POSTGRES_DB\" -Fc' > \"\$backup_file\"

            echo \"Writing baseline invariants snapshot to \$baseline_snapshot\"
            \$COMPOSE_CMD run --rm python-api python scripts/verify_invariants.py --write \"\$baseline_snapshot\"

            echo 'Running Prisma migrations and bootstrap seed'
            \$COMPOSE_CMD -f docker-compose.yml -f docker-compose.migrate.yml run --rm prisma-bootstrap

            echo 'Starting python-api and python-worker'
            \$COMPOSE_CMD up -d --remove-orphans python-api python-worker

            echo \"DEPLOY_BACKUP_FILE=\$backup_file\" > .deploy-state
            echo \"DEPLOY_BASELINE_SNAPSHOT=\$baseline_snapshot\" >> .deploy-state
          "

      - name: Verify python-api readiness
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          REMOTE_APP_DIR: ${{ secrets.REMOTE_APP_DIR }}
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "
            set -e
            cd '$REMOTE_APP_DIR'

            if docker compose version >/dev/null 2>&1; then
              COMPOSE_CMD='docker compose'
            elif command -v docker-compose >/dev/null 2>&1; then
              COMPOSE_CMD='docker-compose'
            else
              echo 'Neither docker compose nor docker-compose is available on the server' >&2
              exit 1
            fi

            verify_url() {
              name=\"\$1\"
              url=\"\$2\"

              for attempt in \$(seq 1 18); do
                if curl --fail --show-error --silent \"\$url\" >/dev/null; then
                  echo \"\$name is ready\"
                  return 0
                fi
                echo \"\$name is not ready yet (attempt \$attempt/18), waiting 5s...\"
                sleep 5
              done

              echo \"\$name did not become ready in time\" >&2
              \$COMPOSE_CMD ps >&2 || true
              \$COMPOSE_CMD logs --tail=200 python-api >&2 || true
              \$COMPOSE_CMD logs --tail=200 python-worker >&2 || true
              \$COMPOSE_CMD logs --tail=100 web >&2 || true
              return 1
            }

            verify_running_service() {
              service_name=\"\$1\"
              if ! \$COMPOSE_CMD ps --status running --services | grep -Fx \"\$service_name\" >/dev/null; then
                echo \"Service \$service_name is not running\" >&2
                \$COMPOSE_CMD ps >&2 || true
                \$COMPOSE_CMD logs --tail=200 \"\$service_name\" >&2 || true
                return 1
              fi
            }

            verify_running_service 'python-worker'
            verify_running_service 'python-api'
            verify_url 'API' 'http://127.0.0.1:3001/api/health/ready'

            readiness_json=\$(curl --fail --show-error --silent 'http://127.0.0.1:3001/api/health/ready')
            READINESS_JSON="\$readiness_json" python3 -c "import json, os; payload=json.loads(os.environ['READINESS_JSON']); checks=payload.get('checks', {}); queue=checks.get('jobQueue', {}); features=checks.get('features', {}); assert checks.get('databaseReady') is True, 'database readiness failed'; assert checks.get('storageReady') is True, 'storage readiness failed'; assert isinstance(queue, dict) and 'deadLetterCount' in queue, f'missing queue diagnostics: {checks}'; assert queue.get('deadLetterCount', 0) == 0, f'dead-letter jobs detected: {queue}'; assert queue.get('runningCount', 0) < 50, f'runaway running jobs detected: {queue}'; assert all(isinstance(value, bool) for value in features.values()), f'invalid feature flag payload: {features}'"

            metrics_status=\$(curl --show-error --silent --output /tmp/metrics.json --write-out '%{http_code}' 'http://127.0.0.1:3001/api/metrics')
            if [ "\$metrics_status" != '200' ]; then
              echo "Expected /api/metrics to return 200, got \$metrics_status" >&2
              cat /tmp/metrics.json >&2 || true
              exit 1
            fi

            headers=\$(curl --show-error --silent --dump-header - --output /dev/null 'http://127.0.0.1:3001/api/health')
            echo "\$headers" | grep -i '^X-Request-Id:' >/dev/null || {
              echo 'Missing X-Request-Id header from API response' >&2
              exit 1
            }
            echo "\$headers" | grep -i '^X-Correlation-Id:' >/dev/null || {
              echo 'Missing X-Correlation-Id header from API response' >&2
              exit 1
            }
          "

      - name: Run contract verification on server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          REMOTE_APP_DIR: ${{ secrets.REMOTE_APP_DIR }}
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "
            set -e
            cd '$REMOTE_APP_DIR'

            if docker compose version >/dev/null 2>&1; then
              COMPOSE_CMD='docker compose'
            elif command -v docker-compose >/dev/null 2>&1; then
              COMPOSE_CMD='docker-compose'
            else
              echo 'Neither docker compose nor docker-compose is available on the server' >&2
              exit 1
            fi

            VERIFY_API_BASE_URL='http://python-api:3001/api'
            VERIFY_ADMIN_EMAIL=\$(\$COMPOSE_CMD run --rm --no-deps python-api python -c \"import os; print(os.getenv('ADMIN_EMAIL', ''))\" | tr -d '\r')
            VERIFY_ADMIN_PASSWORD=\$(\$COMPOSE_CMD run --rm --no-deps python-api python -c \"import os; print(os.getenv('ADMIN_PASSWORD', ''))\" | tr -d '\r')
            VERIFY_MEMBER_EMAIL=\$(\$COMPOSE_CMD run --rm --no-deps python-api python -c \"import os; print(os.getenv('VERIFY_MEMBER_EMAIL', ''))\" | tr -d '\r')
            VERIFY_MEMBER_PASSWORD=\$(\$COMPOSE_CMD run --rm --no-deps python-api python -c \"import os; print(os.getenv('VERIFY_MEMBER_PASSWORD', ''))\" | tr -d '\r')

            if [ -z \"\$VERIFY_ADMIN_EMAIL\" ] || [ -z \"\$VERIFY_ADMIN_PASSWORD\" ]; then
              echo 'ADMIN_EMAIL and ADMIN_PASSWORD must be set in .env for contract verification' >&2
              exit 1
            fi

            \$COMPOSE_CMD run --rm \
              -e VERIFY_API_BASE_URL=\"\$VERIFY_API_BASE_URL\" \
              -e VERIFY_ADMIN_EMAIL=\"\$VERIFY_ADMIN_EMAIL\" \
              -e VERIFY_ADMIN_PASSWORD=\"\$VERIFY_ADMIN_PASSWORD\" \
              -e VERIFY_MEMBER_EMAIL=\"\$VERIFY_MEMBER_EMAIL\" \
              -e VERIFY_MEMBER_PASSWORD=\"\$VERIFY_MEMBER_PASSWORD\" \
              python-api python scripts/verify_contract.py
          "

      - name: Compare post-start invariants on server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          REMOTE_APP_DIR: ${{ secrets.REMOTE_APP_DIR }}
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "
            set -e
            cd '$REMOTE_APP_DIR'
            . ./.deploy-state

            if docker compose version >/dev/null 2>&1; then
              COMPOSE_CMD='docker compose'
            elif command -v docker-compose >/dev/null 2>&1; then
              COMPOSE_CMD='docker-compose'
            else
              echo 'Neither docker compose nor docker-compose is available on the server' >&2
              exit 1
            fi

            \$COMPOSE_CMD run --rm python-api python scripts/verify_invariants.py --compare \"\$DEPLOY_BASELINE_SNAPSHOT\"
          "

      - name: Start web after automated gates
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          REMOTE_APP_DIR: ${{ secrets.REMOTE_APP_DIR }}
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "
            set -e
            cd '$REMOTE_APP_DIR'

            if docker compose version >/dev/null 2>&1; then
              COMPOSE_CMD='docker compose'
            elif command -v docker-compose >/dev/null 2>&1; then
              COMPOSE_CMD='docker-compose'
            else
              echo 'Neither docker compose nor docker-compose is available on the server' >&2
              exit 1
            fi

            \$COMPOSE_CMD up -d web
          "

      - name: Verify web on server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          REMOTE_APP_DIR: ${{ secrets.REMOTE_APP_DIR }}
          APP_URL: ${{ secrets.APP_URL }}
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "
            set -e
            cd '$REMOTE_APP_DIR'

            verify_url() {
              name=\"\$1\"
              url=\"\$2\"

              for attempt in \$(seq 1 18); do
                if curl --fail --show-error --silent \"\$url\" >/dev/null; then
                  echo \"\$name is ready\"
                  return 0
                fi
                echo \"\$name is not ready yet (attempt \$attempt/18), waiting 5s...\"
                sleep 5
              done

              echo \"\$name did not become ready in time\" >&2
              return 1
            }

            verify_url 'Web' '$APP_URL'
          "
